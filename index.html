<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Template Tech Plan Generator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 2rem;
      background: #f4f5f7;
      color: #1f2933;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    .layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
      max-width: 640px;
    }
    .field {
      margin-bottom: 1rem;
    }
    .field.hidden {
      display: none;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    select {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      border: 1px solid #cbd2d9;
      font-size: 0.95rem;
      background: #fff;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.5rem 0.9rem;
      border-radius: 4px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #outputContainer {
      flex: 1;
      max-height: 80vh;
      overflow: auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.25rem;
    }
    .chunk {
      background: transparent;
      color: #111827;
      padding: 0;
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }
    .chunk-header {
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #7f1d1d;
      font-size: 0.8rem;
    }
    .doc-body {
      font-size: 0.95rem;
      line-height: 1.45;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .doc-gap {
      height: 10px;
    }
    .doc-bold-line {
      font-weight: 700;
      margin: 0.6rem 0 0.35rem;
    }
    .doc-paragraph {
      margin: 0.15rem 0;
    }
    .doc-bullets {
      margin: 0.25rem 0 0.75rem 1.25rem;
      padding-left: 1rem;
    }
    .doc-bullets li {
      margin: 0.1rem 0;
    }
    .doc-code {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height: 1.35;
      font-size: 0.9rem;
    }
    .hint {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="card">
      <h1>Tech Plan Generator</h1>
      <div class="field">
        <label for="integrationType">Integration type</label>
        <select id="integrationType">
          <option value="js">JS</option>
          <option value="api">API</option>
        </select>
      </div>
      <div class="field hidden" id="apiPlanVariantField">
        <label for="apiPlanVariant">API plan</label>
        <select id="apiPlanVariant">
          <option value="standard">Standard (Lead / Sale API 1 or 2)</option>
          <option value="lead_parent_2">Lead Parent API 2</option>
          <option value="sale_parent_2">Sale Parent API 2</option>
          <option value="lead_sale_pla_2">Lead &amp; Sale PLA API 2</option>
          <option value="lead_parent_pla_2">Lead Parent PLA API 2</option>
          <option value="sale_parent_pla_2">Sale Parent PLA API 2</option>
        </select>
      </div>
      <div class="field" id="eventTypeField">
        <label for="eventType">Event type</label>
        <select id="eventType">
          <option value="sale">Sale</option>
          <option value="lead">Lead</option>
        </select>
      </div>
      <div class="field" id="eventCountField">
        <label for="eventCount">Number of events</label>
        <select id="eventCount">
          <option value="1">1</option>
          <option value="2plus">2+</option>
        </select>
      </div>
      <button id="generateBtn" type="button">Generate Tech Plan</button>
      <p class="hint">
        Generated tech plan appears to the right. Reloading the page clears the output.
      </p>
    </div>

    <div id="outputContainer"></div>
  </div>

  <script>
    const API_ROOT = "templates/1_integrations/api/";
    const API_SHARED = API_ROOT + "3_shared api/";
    const API_NUM = API_ROOT + "1_num of events/";
    const API_EVENTS = API_ROOT + "2_type of events/";

    function apiAppendix() {
      return [
        "templates/0_shared/05_End To End Testing And Event Validation.txt",
        "templates/0_shared/06_Resources.txt",
        API_SHARED + "90_A_Creating a Test Partner Account.txt",
        API_SHARED + "91_A_How to Access a Test Tracking Link.txt",
        API_SHARED + "92_A_Ad Code.txt",
        API_SHARED + "93_A_How to Execute an End to End Test with a Test Partner.txt"
      ];
    }

    /**
     * Standard API (Lead API 1/2, Sale API 1/2) — order per templates.txt "API Integrations".
     */
    function getApiStandardFiles(eventType, eventCount) {
      const overview =
        eventCount === "1"
          ? API_NUM + "01_Sale or Lead Overview 1.txt"
          : API_NUM + "02_Sale or Lead Overview 2.txt";

      const callAndParam =
        eventType === "sale"
          ? [API_EVENTS + "01_Sale api Call.txt", API_EVENTS + "02_Sale api Parameter Table.txt"]
          : [API_EVENTS + "03_Lead api Call.txt", API_EVENTS + "04_Lead api Parameter Table.txt"];

      return [
        "templates/0_shared/01_Brand Header.txt",
        overview,
        "templates/0_shared/02_Document History.txt",
        API_SHARED + "01_Technical Requirements.txt",
        "templates/0_shared/03_How to Contact impact.com.txt",
        "templates/0_shared/04_Guidelines For Custom Tracking Domains.txt",
        API_SHARED + "03_Capturing and Storing ClickID.txt",
        API_SHARED + "04_Reporting Conversion Events via Conversions API.txt",
        ...callAndParam,
        ...apiAppendix()
      ];
    }

    /**
     * API Parent (Lead Parent API 2, Sale Parent API 2) — per templates.txt "API Parent Integrations".
     */
    function getApiLeadParent2Files() {
      return [
        "templates/0_shared/01_Brand Header.txt",
        API_NUM + "04_Lead Parent Overview 2.txt",
        "templates/0_shared/02_Document History.txt",
        API_SHARED + "02_Technical Requirements Parent & PLA.txt",
        "templates/0_shared/03_How to Contact impact.com.txt",
        "templates/0_shared/04_Guidelines For Custom Tracking Domains.txt",
        API_SHARED + "03_Capturing and Storing ClickID.txt",
        API_SHARED + "04_Reporting Conversion Events via Conversions API.txt",
        API_EVENTS + "03_Lead api Call.txt",
        API_EVENTS + "01_Sale api Call.txt",
        API_EVENTS + "06_Lead Parent Conversions Parameter Table.txt",
        ...apiAppendix()
      ];
    }

    function getApiSaleParent2Files() {
      return [
        "templates/0_shared/01_Brand Header.txt",
        API_NUM + "03_Sale Parent Overview 2.txt",
        "templates/0_shared/02_Document History.txt",
        API_SHARED + "02_Technical Requirements Parent & PLA.txt",
        "templates/0_shared/03_How to Contact impact.com.txt",
        "templates/0_shared/04_Guidelines For Custom Tracking Domains.txt",
        API_SHARED + "03_Capturing and Storing ClickID.txt",
        API_SHARED + "04_Reporting Conversion Events via Conversions API.txt",
        API_EVENTS + "03_Lead api Call.txt",
        API_EVENTS + "01_Sale api Call.txt",
        API_EVENTS + "05_Sale Parent Conversions Parameter Table.txt",
        ...apiAppendix()
      ];
    }

    /**
     * API PLA variants — per templates.txt "API PLA Integrations" (PLA call → PLA param → example responses → Reporting → Lead → Sale → conversions param table).
     */
    function getApiPlaVariantFiles(overviewFile, finalConversionsParamTable) {
      return [
        "templates/0_shared/01_Brand Header.txt",
        overviewFile,
        "templates/0_shared/02_Document History.txt",
        API_SHARED + "02_Technical Requirements Parent & PLA.txt",
        "templates/0_shared/03_How to Contact impact.com.txt",
        "templates/0_shared/04_Guidelines For Custom Tracking Domains.txt",
        API_SHARED + "03_Capturing and Storing ClickID.txt",
        API_EVENTS + "07_Sale or Lead PLA Call.txt",
        API_EVENTS + "08_Sale or Lead PLA Parameter Table.txt",
        API_EVENTS + "09_Sale or Lead PLA Example Responses.txt",
        API_SHARED + "04_Reporting Conversion Events via Conversions API.txt",
        API_EVENTS + "03_Lead api Call.txt",
        API_EVENTS + "01_Sale api Call.txt",
        finalConversionsParamTable,
        ...apiAppendix()
      ];
    }

    function getApiLeadSalePla2Files() {
      return getApiPlaVariantFiles(
        API_NUM + "05_Lead & Sale Overview 2.txt",
        API_EVENTS + "10_Lead & Sale PLA Conversions Parameter Table.txt"
      );
    }

    function getApiLeadParentPla2Files() {
      return getApiPlaVariantFiles(
        API_NUM + "04_Lead Parent Overview 2.txt",
        API_EVENTS + "11_Lead Parent PLA Conversions Parameter Table.txt"
      );
    }

    function getApiSaleParentPla2Files() {
      return getApiPlaVariantFiles(
        API_NUM + "03_Sale Parent Overview 2.txt",
        API_EVENTS + "12_Sale Parent PLA Conversions Parameter Table.txt"
      );
    }

    function getApiFilesByVariant(variant, eventType, eventCount) {
      switch (variant) {
        case "standard":
          return getApiStandardFiles(eventType, eventCount);
        case "lead_parent_2":
          return getApiLeadParent2Files();
        case "sale_parent_2":
          return getApiSaleParent2Files();
        case "lead_sale_pla_2":
          return getApiLeadSalePla2Files();
        case "lead_parent_pla_2":
          return getApiLeadParentPla2Files();
        case "sale_parent_pla_2":
          return getApiSaleParentPla2Files();
        default:
          return getApiStandardFiles(eventType, eventCount);
      }
    }

    // JS integration: build ordered list of modules per templates.txt "JS Integrations".
    function getJsFiles(eventType, eventCount) {
      const files = [];

      files.push("templates/0_shared/01_Brand Header.txt");

      if (eventType === "sale") {
        if (eventCount === "1") {
          files.push("templates/1_integrations/js/1_num of events/01_Sale 1 Overview.txt");
        } else {
          files.push("templates/1_integrations/js/1_num of events/03_Sale 2 Overview.txt");
        }
      } else if (eventType === "lead") {
        files.push("templates/1_integrations/js/1_num of events/05_Lead 1 or 2 Overview.txt");
      }

      files.push("templates/0_shared/02_Document History.txt");
      files.push("templates/1_integrations/js/3_shared js/01_Technical Requirements.txt");
      files.push("templates/0_shared/03_How to Contact impact.com.txt");
      files.push("templates/0_shared/04_Guidelines For Custom Tracking Domains.txt");
      files.push("templates/1_integrations/js/3_shared js/03_Guidelines For Custom Profile IDs.txt");
      files.push("templates/1_integrations/js/3_shared js/04_Universal Tracking Tag.txt");
      files.push("templates/1_integrations/js/3_shared js/05_Identity Function.txt");

      if (eventType === "sale") {
        if (eventCount === "1") {
          files.push("templates/1_integrations/js/1_num of events/02_Sale 1 Conversion Tracking Header.txt");
        } else {
          files.push("templates/1_integrations/js/1_num of events/04_Sale 2 Conversion Tracking Header.txt");
        }
      } else if (eventType === "lead") {
        files.push("templates/1_integrations/js/1_num of events/06_Lead 1 or 2 Conversion Tracking Header.txt");
      }

      if (eventType === "sale") {
        files.push("templates/1_integrations/js/2_type of events/01_Sale js Conversion Tracking.txt");
      } else if (eventType === "lead") {
        files.push("templates/1_integrations/js/2_type of events/03_Lead js Conversion Tracking.txt");
      }

      if (eventType === "sale") {
        files.push("templates/1_integrations/js/2_type of events/02_Sale js Parameter Table.txt");
      } else if (eventType === "lead") {
        files.push("templates/1_integrations/js/2_type of events/04_Lead js Parameter Table.txt");
      }

      files.push("templates/0_shared/05_End To End Testing And Event Validation.txt");
      files.push("templates/0_shared/06_Resources.txt");
      files.push("templates/1_integrations/js/3_shared js/93_A_Cookie Banners & Cookie Policies.txt");
      files.push("templates/1_integrations/js/3_shared js/94_A_Capturing and Storing Click ID.txt");

      if (eventCount === "1") {
        files.push("templates/1_integrations/js/1_num of events/07_A_Sale 1 User Journey .txt");
      } else {
        files.push("templates/1_integrations/js/1_num of events/08_A_Sale or Lead 2 User Journey.txt");
      }

      files.push("templates/1_integrations/js/3_shared js/95_A_Creating a Test Partner Account.txt");
      files.push("templates/1_integrations/js/3_shared js/96_A_How to Access a Test Tracking Link.txt");
      files.push("templates/1_integrations/js/3_shared js/97_A_Ad Code.txt");
      files.push("templates/1_integrations/js/3_shared js/98_A_How to Execute an End to End Test with Test Partner.txt");

      return files;
    }

    function updateFormVisibility() {
      const integrationType = document.getElementById("integrationType").value;
      const variantField = document.getElementById("apiPlanVariantField");
      const eventTypeField = document.getElementById("eventTypeField");
      const eventCountField = document.getElementById("eventCountField");
      const variant = document.getElementById("apiPlanVariant").value;

      if (integrationType === "api") {
        variantField.classList.remove("hidden");
        if (variant === "standard") {
          eventTypeField.classList.remove("hidden");
          eventCountField.classList.remove("hidden");
        } else {
          eventTypeField.classList.add("hidden");
          eventCountField.classList.add("hidden");
        }
      } else {
        variantField.classList.add("hidden");
        eventTypeField.classList.remove("hidden");
        eventCountField.classList.remove("hidden");
      }
    }

    async function fetchTextFile(path) {
      const resp = await fetch(path);
      if (!resp.ok) {
        return { path, content: `Error loading file (${resp.status})` };
      }
      const text = await resp.text();
      return { path, content: text };
    }

    function isAllCapsHeader(trimmedLine) {
      // Heuristic: bold lines like "TECHNICAL REQUIREMENTS", "HOW TO CONTACT IMPACT.COM".
      if (trimmedLine.length < 2 || trimmedLine.length > 90) return false;
      if (!/[A-Z]/.test(trimmedLine)) return false;
      return trimmedLine === trimmedLine.toUpperCase();
    }

    function isLikelySectionHeader(trimmedLine) {
      if (isAllCapsHeader(trimmedLine)) return true;
      // Also treat short "X:" lines as headers (common in your templates).
      if (trimmedLine.endsWith(":") && trimmedLine.length <= 70) return true;
      return false;
    }

    function leadingSpaceCount(line) {
      const match = line.match(/^(\s*)/);
      if (!match) return 0;
      // Treat tab as 2 spaces for consistent indentation detection.
      return match[1].replace(/\t/g, "  ").length;
    }

    function renderDocTextInto(container, text, opts = {}) {
      const allowIndentedBullets = opts.allowIndentedBullets !== false;
      const lines = (text || "").replace(/\r\n/g, "\n").split("\n");

      let currentUl = null;
      const flushUl = () => {
        if (currentUl) {
          container.appendChild(currentUl);
          currentUl = null;
        }
      };

      for (const rawLine of lines) {
        const indent = leadingSpaceCount(rawLine);
        const trimmed = rawLine.trim();

        if (trimmed === "") {
          flushUl();
          container.appendChild(document.createElement("div")).className = "doc-gap";
          continue;
        }

        const isIndentedBullet = allowIndentedBullets && indent >= 4;
        const startsWithBullet =
          /^[-*]\s+/.test(trimmed) || /^•\s+/.test(trimmed);

        if (isIndentedBullet || startsWithBullet) {
          if (!currentUl) currentUl = document.createElement("ul");
          currentUl.className = "doc-bullets";

          const liText = trimmed.replace(/^[-*]\s+/, "").replace(/^•\s+/, "");
          const li = document.createElement("li");
          li.textContent = liText;
          currentUl.appendChild(li);
          continue;
        }

        flushUl();

        if (isLikelySectionHeader(trimmed)) {
          const div = document.createElement("div");
          div.className = "doc-bold-line";
          div.textContent = trimmed;
          container.appendChild(div);
        } else {
          const p = document.createElement("div");
          p.className = "doc-paragraph";
          p.textContent = trimmed;
          container.appendChild(p);
        }
      }

      flushUl();
    }

    async function generatePlan() {
      const integrationType = document.getElementById("integrationType").value;
      const eventType = document.getElementById("eventType").value;
      const eventCount = document.getElementById("eventCount").value;
      const apiPlanVariant = document.getElementById("apiPlanVariant").value;

      const outputContainer = document.getElementById("outputContainer");
      outputContainer.innerHTML = "";

      let filesToLoad = [];

      if (integrationType === "js") {
        filesToLoad = getJsFiles(eventType, eventCount);
      } else {
        filesToLoad = getApiFilesByVariant(apiPlanVariant, eventType, eventCount);
      }

      const results = await Promise.all(filesToLoad.map(fetchTextFile));

      results.forEach(({ path, content }) => {
        const wrapper = document.createElement("div");
        wrapper.className = "chunk";

        const header = document.createElement("div");
        header.className = "chunk-header";
        header.textContent = `Source: ${path}`;

        const body = document.createElement("div");
        body.className = "doc-body";

        // JS conversion tracking templates often contain script/code blocks.
        // Render those chunks as pre-wrapped text and avoid turning indented code into bullets.
        const suppressBulletsForJsConversionScripts =
          integrationType === "js" &&
          path.includes("Conversion Tracking") &&
          !path.includes("Header");

        if (suppressBulletsForJsConversionScripts) {
          body.innerHTML = "";
          const pre = document.createElement("pre");
          pre.className = "doc-code";
          pre.textContent = content;
          body.appendChild(pre);
        } else {
          renderDocTextInto(body, content, { allowIndentedBullets: true });
        }

        wrapper.appendChild(header);
        wrapper.appendChild(body);
        outputContainer.appendChild(wrapper);
      });
    }

    document.getElementById("integrationType").addEventListener("change", updateFormVisibility);
    document.getElementById("apiPlanVariant").addEventListener("change", updateFormVisibility);
    document.getElementById("generateBtn").addEventListener("click", generatePlan);

    updateFormVisibility();
  </script>
</body>
</html>
