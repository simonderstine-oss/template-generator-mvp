<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Template Tech Plan Generator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 2rem;
      background: #f4f5f7;
      color: #1f2933;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    .layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
      max-width: 640px;
    }
    .field {
      margin-bottom: 1rem;
    }
    .field.hidden {
      display: none;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    select {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      border: 1px solid #cbd2d9;
      font-size: 0.95rem;
      background: #fff;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.5rem 0.9rem;
      border-radius: 4px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #outputContainer {
      flex: 1;
      max-height: 80vh;
      overflow: auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.25rem;
    }
    .chunk {
      background: transparent;
      color: #111827;
      padding: 0;
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }
    .chunk-header {
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #7f1d1d;
      font-size: 0.8rem;
    }
    .doc-body {
      font-size: 0.95rem;
      line-height: 1.45;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .doc-gap {
      height: 10px;
    }
    .doc-bold-line {
      font-weight: 700;
      margin: 0.6rem 0 0.35rem;
    }
    .doc-paragraph {
      margin: 0.15rem 0;
    }
    .doc-bullets {
      margin: 0.25rem 0 0.75rem 1.25rem;
      padding-left: 1rem;
    }
    .doc-bullets li {
      margin: 0.1rem 0;
    }
    .doc-code {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height: 1.35;
      font-size: 0.9rem;
    }
    .hint {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #6b7280;
    }
    textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid #cbd2d9;
      border-radius: 4px;
      padding: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .meta {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .meta p {
      margin: 0.25rem 0;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="card">
      <h1>Tech Plan Generator</h1>
      <p style="margin: 0 0 1rem; font-size: 0.9rem">
        <a href="/library.html">Library</a> — browse all available template bundles (view only)
      </p>
      <div class="field">
        <label for="integrationType">Integration type</label>
        <select id="integrationType">
          <option value="js">JS</option>
          <option value="api">API</option>
        </select>
      </div>
      <div class="field hidden" id="apiPlanVariantField">
        <label for="apiPlanVariant">API plan</label>
        <select id="apiPlanVariant">
          <option value="standard">Standard (Lead / Sale API 1 or 2)</option>
          <option value="lead_parent_2">Lead Parent API 2</option>
          <option value="sale_parent_2">Sale Parent API 2</option>
          <option value="lead_sale_pla_2">Lead &amp; Sale PLA API 2</option>
          <option value="lead_parent_pla_2">Lead Parent PLA API 2</option>
          <option value="sale_parent_pla_2">Sale Parent PLA API 2</option>
        </select>
      </div>
      <div class="field" id="eventTypeField">
        <label for="eventType">Event type</label>
        <select id="eventType">
          <option value="sale">Sale</option>
          <option value="lead">Lead</option>
        </select>
      </div>
      <div class="field" id="eventCountField">
        <label for="eventCount">Number of events</label>
        <select id="eventCount">
          <option value="1">1</option>
          <option value="2plus">2+</option>
        </select>
      </div>
      <div class="field">
        <label class="toggle" for="useAiPreview">
          <input id="useAiPreview" type="checkbox" />
          AI Assist (Preview)
        </label>
      </div>
      <div class="field hidden" id="nlRequestField">
        <label for="naturalLanguageRequest">Natural language request</label>
        <textarea id="naturalLanguageRequest" placeholder="Example: Build a sale API plan for 2+ events with implementation assumptions and a short risk section."></textarea>
      </div>
      <button id="generateBtn" type="button">Generate Tech Plan</button>
      <p class="hint">
        Generated tech plan appears to the right. Run with <code>npm start</code> and open <code>http://localhost:8000</code>.
      </p>
    </div>

    <div id="outputContainer"></div>
  </div>

  <script>
    function updateFormVisibility() {
      const integrationType = document.getElementById("integrationType").value;
      const variantField = document.getElementById("apiPlanVariantField");
      const eventTypeField = document.getElementById("eventTypeField");
      const eventCountField = document.getElementById("eventCountField");
      const nlRequestField = document.getElementById("nlRequestField");
      const useAiPreview = document.getElementById("useAiPreview").checked;
      const variant = document.getElementById("apiPlanVariant").value;

      if (integrationType === "api") {
        variantField.classList.remove("hidden");
        if (variant === "standard") {
          eventTypeField.classList.remove("hidden");
          eventCountField.classList.remove("hidden");
        } else {
          eventTypeField.classList.add("hidden");
          eventCountField.classList.add("hidden");
        }
      } else {
        variantField.classList.add("hidden");
        eventTypeField.classList.remove("hidden");
        eventCountField.classList.remove("hidden");
      }

      if (useAiPreview) {
        nlRequestField.classList.remove("hidden");
      } else {
        nlRequestField.classList.add("hidden");
      }
    }

    function isAllCapsHeader(trimmedLine) {
      // Heuristic: bold lines like "TECHNICAL REQUIREMENTS", "HOW TO CONTACT IMPACT.COM".
      if (trimmedLine.length < 2 || trimmedLine.length > 90) return false;
      if (!/[A-Z]/.test(trimmedLine)) return false;
      return trimmedLine === trimmedLine.toUpperCase();
    }

    function isLikelySectionHeader(trimmedLine) {
      if (isAllCapsHeader(trimmedLine)) return true;
      // Also treat short "X:" lines as headers (common in your templates).
      if (trimmedLine.endsWith(":") && trimmedLine.length <= 70) return true;
      return false;
    }

    function leadingSpaceCount(line) {
      const match = line.match(/^(\s*)/);
      if (!match) return 0;
      // Treat tab as 2 spaces for consistent indentation detection.
      return match[1].replace(/\t/g, "  ").length;
    }

    function renderDocTextInto(container, text, opts = {}) {
      const allowIndentedBullets = opts.allowIndentedBullets !== false;
      const lines = (text || "").replace(/\r\n/g, "\n").split("\n");

      let currentUl = null;
      const flushUl = () => {
        if (currentUl) {
          container.appendChild(currentUl);
          currentUl = null;
        }
      };

      for (const rawLine of lines) {
        const indent = leadingSpaceCount(rawLine);
        const trimmed = rawLine.trim();

        if (trimmed === "") {
          flushUl();
          container.appendChild(document.createElement("div")).className = "doc-gap";
          continue;
        }

        const isIndentedBullet = allowIndentedBullets && indent >= 4;
        const startsWithBullet =
          /^[-*]\s+/.test(trimmed) || /^•\s+/.test(trimmed);

        if (isIndentedBullet || startsWithBullet) {
          if (!currentUl) currentUl = document.createElement("ul");
          currentUl.className = "doc-bullets";

          const liText = trimmed.replace(/^[-*]\s+/, "").replace(/^•\s+/, "");
          const li = document.createElement("li");
          li.textContent = liText;
          currentUl.appendChild(li);
          continue;
        }

        flushUl();

        if (isLikelySectionHeader(trimmed)) {
          const div = document.createElement("div");
          div.className = "doc-bold-line";
          div.textContent = trimmed;
          container.appendChild(div);
        } else {
          const p = document.createElement("div");
          p.className = "doc-paragraph";
          p.textContent = trimmed;
          container.appendChild(p);
        }
      }

      flushUl();
    }

    function renderMeta(summary) {
      const block = document.createElement("div");
      block.className = "meta";
      block.innerHTML = `
        <p><strong>Mode:</strong> ${summary.mode}</p>
        <p><strong>Prompt version:</strong> ${summary.promptVersion || "n/a"}</p>
        <p><strong>Source files:</strong> ${summary.sourceFiles.length}</p>
      `;
      return block;
    }

    async function generatePlan() {
      const integrationType = document.getElementById("integrationType").value;
      const eventType = document.getElementById("eventType").value;
      const eventCount = document.getElementById("eventCount").value;
      const apiPlanVariant = document.getElementById("apiPlanVariant").value;
      const useAiPreview = document.getElementById("useAiPreview").checked;
      const naturalLanguageRequest = document.getElementById("naturalLanguageRequest").value.trim();

      const outputContainer = document.getElementById("outputContainer");
      outputContainer.innerHTML = "";
      outputContainer.textContent = "Generating...";

      let payload;
      try {
        const response = await fetch("/api/plan/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            integrationType,
            eventType,
            eventCount,
            apiPlanVariant,
            useAiPreview,
            naturalLanguageRequest
          })
        });
        payload = await response.json();
        outputContainer.innerHTML = "";

        if (!response.ok) {
          outputContainer.textContent = payload.error || "Failed to generate plan.";
          return;
        }
      } catch (error) {
        outputContainer.innerHTML = "";
        outputContainer.textContent = `Request failed: ${error.message || "Unknown error"}`;
        return;
      }

      outputContainer.appendChild(renderMeta(payload));

      if (payload.missingInputs && payload.missingInputs.length) {
        const wrapper = document.createElement("div");
        wrapper.className = "chunk";
        const body = document.createElement("div");
        body.className = "doc-body";
        renderDocTextInto(body, `Missing Inputs:\n- ${payload.missingInputs.join("\n- ")}`);
        wrapper.appendChild(body);
        outputContainer.appendChild(wrapper);
      }

      (payload.sections || []).forEach((section, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "chunk";

        const header = document.createElement("div");
        header.className = "chunk-header";
        header.textContent = `${index + 1}. ${section.title} (${section.sectionId})`;

        const body = document.createElement("div");
        body.className = "doc-body";
        renderDocTextInto(body, section.content, { allowIndentedBullets: true });

        wrapper.appendChild(header);
        wrapper.appendChild(body);
        outputContainer.appendChild(wrapper);
      });
    }

    document.getElementById("integrationType").addEventListener("change", updateFormVisibility);
    document.getElementById("apiPlanVariant").addEventListener("change", updateFormVisibility);
    document.getElementById("useAiPreview").addEventListener("change", updateFormVisibility);
    document.getElementById("generateBtn").addEventListener("click", generatePlan);

    updateFormVisibility();
  </script>
</body>
</html>
